plugins {
    id 'com.android.application' version '8.5.2'
}

android {
    namespace 'com.kun.statusbarfont'
    compileSdk 34

    defaultConfig {
        applicationId "com.kun.statusbarfont"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
